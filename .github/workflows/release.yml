name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease   # increment N in vX.Y.Z-LABEL.N (latest tag must be a prerelease)
      prerelease_label:
        description: 'Pre-release label (beta, rc, alpha). Empty = stable. Ignored when bump=prerelease.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Resolve tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
            LABEL="${{ github.event.inputs.prerelease_label }}"

            if [ "$BUMP" = "prerelease" ]; then
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
              if [[ "$LATEST_TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)-([a-zA-Z]+)\.([0-9]+)$ ]]; then
                BASE="${BASH_REMATCH[1]}"
                PRE_LABEL="${BASH_REMATCH[2]}"
                N="${BASH_REMATCH[3]}"
                TAG_NAME="${BASE}-${PRE_LABEL}.$((N + 1))"
              else
                echo "::error::bump=prerelease requires the latest tag to be a prerelease (got '$LATEST_TAG'). Use bump=patch/minor/major with prerelease_label to start a new prerelease cycle."
                exit 1
              fi
            else
              # Find latest STABLE tag (no '-' suffix). sort -V handles version ordering.
              LATEST_STABLE=$(git tag -l 'v*' | grep -v -- '-' | sort -V | tail -1 || true)
              LATEST_STABLE=${LATEST_STABLE:-v0.0.0}
              VERSION_NUM=${LATEST_STABLE#v}
              IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              TARGET="v${MAJOR}.${MINOR}.${PATCH}"

              if [ -n "$LABEL" ]; then
                # Find next free vTARGET-LABEL.N
                N=1
                while git rev-parse "${TARGET}-${LABEL}.${N}" >/dev/null 2>&1; do
                  N=$((N + 1))
                done
                TAG_NAME="${TARGET}-${LABEL}.${N}"
              else
                TAG_NAME="$TARGET"
              fi
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "Computed tag: ${TAG_NAME}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          if [[ "$TAG_NAME" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Ensure arm64 release runner
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          if [ "$ARCH" != "arm64" ]; then
            echo "::error::metaphor-cli release assets are currently macos_arm64 only, but runner arch is $ARCH."
            exit 1
          fi

      - name: Stamp version
        run: |
          set -euo pipefail
          perl -0pi -e "s/public static let version = \"[^\"]+\"/public static let version = \"${VERSION}\"/" Sources/MetaphorCLICore/BuildInfo.swift

      - name: Test
        run: swift test

      - name: Build release binary
        run: swift build -c release

      - name: Package archive
        run: |
          set -euo pipefail
          mkdir -p dist/payload dist/source dist/homebrew
          cp .build/release/metaphor dist/payload/metaphor
          cp -R Templates dist/payload/templates
          chmod 755 dist/payload/metaphor
          ASSET="metaphor-cli_${TAG_NAME}_macos_arm64.tar.gz"
          LATEST_ASSET="metaphor-cli_macos_arm64.tar.gz"
          SOURCE_ASSET="metaphor-cli_${TAG_NAME}_source.tar.gz"
          tar -czf "dist/${ASSET}" -C dist/payload metaphor templates
          cp "dist/${ASSET}" "dist/${LATEST_ASSET}"
          rsync -a \
            --exclude=".git" \
            --exclude=".build" \
            --exclude=".swiftpm" \
            --exclude="dist" \
            ./ "dist/source/metaphor-cli-${VERSION}/"
          tar -czf "dist/${SOURCE_ASSET}" -C dist/source "metaphor-cli-${VERSION}"
          (cd dist && shasum -a 256 "${ASSET}" "${LATEST_ASSET}" "${SOURCE_ASSET}" > checksums.txt)
          SOURCE_SHA="$(awk -v asset="${SOURCE_ASSET}" '$2 == asset { print $1 }' dist/checksums.txt)"
          sed \
            -e "s|@TAG_NAME@|${TAG_NAME}|g" \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@SOURCE_SHA256@|${SOURCE_SHA}|g" \
            Packaging/Homebrew/metaphor.rb.template > dist/homebrew/metaphor.rb
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "LATEST_ASSET=${LATEST_ASSET}" >> "$GITHUB_ENV"
          echo "SOURCE_ASSET=${SOURCE_ASSET}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/${{ env.ASSET }}
            dist/${{ env.LATEST_ASSET }}
            dist/${{ env.SOURCE_ASSET }}
            dist/homebrew/metaphor.rb
            dist/checksums.txt
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
