name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease   # increment N in vX.Y.Z-LABEL.N (latest tag must be a prerelease)
      prerelease_label:
        description: 'Pre-release label (beta, rc, alpha). Empty = stable. Ignored when bump=prerelease.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

# Serialize releases: back-to-back merges each dispatch a release, and two
# parallel runs would compute the same next tag from the same latest tag.
# Queued duplicates collapse (only the newest pending run survives), and the
# surviving run builds main HEAD, so intermediate changes still ship.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Resolve tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
            LABEL="${{ github.event.inputs.prerelease_label }}"

            if [ "$BUMP" = "prerelease" ]; then
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
              if [[ "$LATEST_TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)-([a-zA-Z]+)\.([0-9]+)$ ]]; then
                BASE="${BASH_REMATCH[1]}"
                PRE_LABEL="${BASH_REMATCH[2]}"
                N="${BASH_REMATCH[3]}"
                TAG_NAME="${BASE}-${PRE_LABEL}.$((N + 1))"
              else
                echo "::error::bump=prerelease requires the latest tag to be a prerelease (got '$LATEST_TAG'). Use bump=patch/minor/major with prerelease_label to start a new prerelease cycle."
                exit 1
              fi
            else
              # Find latest STABLE tag (no '-' suffix). sort -V handles version ordering.
              LATEST_STABLE=$(git tag -l 'v*' | grep -v -- '-' | sort -V | tail -1 || true)
              LATEST_STABLE=${LATEST_STABLE:-v0.0.0}
              VERSION_NUM=${LATEST_STABLE#v}
              IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              TARGET="v${MAJOR}.${MINOR}.${PATCH}"

              if [ -n "$LABEL" ]; then
                # Find next free vTARGET-LABEL.N
                N=1
                while git rev-parse "${TARGET}-${LABEL}.${N}" >/dev/null 2>&1; do
                  N=$((N + 1))
                done
                TAG_NAME="${TARGET}-${LABEL}.${N}"
              else
                TAG_NAME="$TARGET"
              fi
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "Computed tag: ${TAG_NAME}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          if [[ "$TAG_NAME" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Ensure arm64 release runner
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          if [ "$ARCH" != "arm64" ]; then
            echo "::error::metaphor-cli release assets are currently macos_arm64 only, but runner arch is $ARCH."
            exit 1
          fi

      - name: Stamp version
        run: |
          set -euo pipefail
          perl -0pi -e "s/public static let version = \"[^\"]+\"/public static let version = \"${VERSION}\"/" Sources/MetaphorCLICore/BuildInfo.swift

      # Pin BuildInfo.defaultMetaphorVersion to the latest stable metaphor
      # library tag so that `metaphor new` has a sensible offline fallback
      # when the GitHub Releases API is unreachable. `releases/latest`
      # excludes prereleases and drafts. If metaphor has no stable release
      # yet, keep whatever value is already in BuildInfo.swift.
      - name: Pin default metaphor library version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(gh api repos/shinyaoguri/metaphor/releases/latest --jq .tag_name 2>/dev/null || true)
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::warning::Could not fetch metaphor latest release; keeping existing defaultMetaphorVersion"
            exit 0
          fi
          LATEST_VERSION="${LATEST#v}"
          echo "Pinning defaultMetaphorVersion to ${LATEST_VERSION}"
          perl -0pi -e "s/public static let defaultMetaphorVersion = \"[^\"]+\"/public static let defaultMetaphorVersion = \"${LATEST_VERSION}\"/" Sources/MetaphorCLICore/BuildInfo.swift

      - name: Test
        run: swift test

      - name: Build release binary
        run: swift build -c release

      - name: Package archive
        run: |
          set -euo pipefail
          mkdir -p dist/payload dist/source dist/homebrew
          cp .build/release/metaphor dist/payload/metaphor
          # The binary links Syphon.framework via @rpath, resolved against the
          # @loader_path rpath — i.e. the framework must sit directly beside the
          # binary. Ship it inside the tarball or the binary aborts at launch
          # with "Library not loaded: @rpath/Syphon.framework/...". cp -R keeps
          # the framework's internal version symlinks intact.
          cp -R .build/release/Syphon.framework dist/payload/Syphon.framework
          cp -R Templates dist/payload/templates
          chmod 755 dist/payload/metaphor
          ASSET="metaphor-cli_${TAG_NAME}_macos_arm64.tar.gz"
          LATEST_ASSET="metaphor-cli_macos_arm64.tar.gz"
          SOURCE_ASSET="metaphor-cli_${TAG_NAME}_source.tar.gz"
          tar -czf "dist/${ASSET}" -C dist/payload metaphor Syphon.framework templates
          cp "dist/${ASSET}" "dist/${LATEST_ASSET}"
          rsync -a \
            --exclude=".git" \
            --exclude=".build" \
            --exclude=".swiftpm" \
            --exclude="dist" \
            ./ "dist/source/metaphor-cli-${VERSION}/"
          tar -czf "dist/${SOURCE_ASSET}" -C dist/source "metaphor-cli-${VERSION}"
          (cd dist && shasum -a 256 "${ASSET}" "${LATEST_ASSET}" "${SOURCE_ASSET}" > checksums.txt)
          SOURCE_SHA="$(awk -v asset="${SOURCE_ASSET}" '$2 == asset { print $1 }' dist/checksums.txt)"
          sed \
            -e "s|@TAG_NAME@|${TAG_NAME}|g" \
            -e "s|@SOURCE_SHA256@|${SOURCE_SHA}|g" \
            Packaging/Homebrew/metaphor.rb.template > dist/homebrew/metaphor.rb
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "LATEST_ASSET=${LATEST_ASSET}" >> "$GITHUB_ENV"
          echo "SOURCE_ASSET=${SOURCE_ASSET}" >> "$GITHUB_ENV"

      # Catch a missing/misplaced Syphon.framework before it ships: extract the
      # tarball into a pristine directory (no .build, no source tree) and launch
      # the binary. A dyld linkage failure aborts the run with a non-zero exit.
      - name: Smoke-test packaged archive (dyld linkage)
        run: |
          set -euo pipefail
          SMOKE="$(mktemp -d)"
          tar -xzf "dist/${ASSET}" -C "$SMOKE"
          ( cd "$SMOKE" && ./metaphor version )
          echo "Smoke test passed: packaged binary resolves Syphon.framework."

      # The tarball smoke above tests the flat extract layout (Homebrew/manual).
      # This exercises the real scripts/install.sh against the freshly built
      # tarball into a throwaway PREFIX, so its libexec+symlink placement is
      # validated end-to-end (a missing/misplaced framework aborts ./metaphor).
      - name: Smoke-test scripts/install.sh end-to-end
        run: |
          set -euo pipefail
          PREFIX_DIR="$(mktemp -d)"
          ARCHIVE="$PWD/dist/${ASSET}" PREFIX="$PREFIX_DIR" bash scripts/install.sh
          "$PREFIX_DIR/bin/metaphor" version
          test -L "$PREFIX_DIR/bin/metaphor"
          test -d "$PREFIX_DIR/libexec/metaphor/Syphon.framework"
          echo "install.sh end-to-end smoke passed."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/${{ env.ASSET }}
            dist/${{ env.LATEST_ASSET }}
            dist/${{ env.SOURCE_ASSET }}
            dist/homebrew/metaphor.rb
            dist/checksums.txt
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Push the generated Formula to shinyaoguri/homebrew-tap ---
      # Only stable releases land in the tap. Prereleases stay attached to the
      # GitHub Release for direct installer / manual `brew install <url>` use.
      - name: Checkout homebrew-tap
        if: env.IS_PRERELEASE == 'false'
        uses: actions/checkout@v6
        with:
          repository: shinyaoguri/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          fetch-depth: 1

      - name: Update Formula in homebrew-tap
        if: env.IS_PRERELEASE == 'false'
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp dist/homebrew/metaphor.rb tap/Formula/metaphor.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/metaphor.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "Update metaphor to ${TAG_NAME}"
          git push
