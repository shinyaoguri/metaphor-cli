name: Bump Syphon pin

# Keeps the Syphon.xcframework pin in Package.swift in sync with metaphor's
# latest stable release. See CONTRACT.md (L2a). Three triggers:
#   - repository_dispatch (syphon-release): instant, fired by metaphor's release
#     workflow. Requires CLI_DISPATCH_TOKEN on the metaphor side.
#   - schedule: a daily poll so a missed/again-untokened dispatch still gets
#     picked up — works with the repo's own GITHUB_TOKEN, no secret required.
#   - workflow_dispatch: manual backfill.
on:
  repository_dispatch:
    types: [syphon-release]
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:
    inputs:
      tag:
        description: 'metaphor release tag (e.g. v0.3.0). Empty = latest stable.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag and checksum
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${DISPATCH_TAG:-${INPUT_TAG:-}}"
          if [ -z "$TAG" ]; then
            # No explicit tag (scheduled poll): ask metaphor for its latest
            # stable release. /releases/latest excludes drafts and prereleases.
            TAG=$(gh api repos/shinyaoguri/metaphor/releases/latest --jq .tag_name)
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Could not resolve a metaphor release tag."
            exit 1
          fi

          # Already pinned to this tag? Nothing to do — avoids redundant runs/PRs.
          if grep -q "releases/download/${TAG}/" Package.swift; then
            echo "Already pinned to ${TAG}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          URL="https://github.com/shinyaoguri/metaphor/releases/download/${TAG}/Syphon.xcframework.zip"
          # Re-derive the checksum from the actually-published asset rather than
          # trusting the dispatched value — the PR must carry a buildable pin.
          curl -fsSL "$URL" -o syphon.zip
          CHECKSUM=$(sha256sum syphon.zip | awk '{print $1}')
          rm -f syphon.zip
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG -> $CHECKSUM"

      - name: Update Package.swift pin
        if: steps.resolve.outputs.skip != 'true'
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          CHECKSUM: ${{ steps.resolve.outputs.checksum }}
        run: |
          set -euo pipefail
          sed -i "s|releases/download/v[^/]*/|releases/download/${TAG}/|g" Package.swift
          sed -i "s|checksum: \"[^\"]*\"|checksum: \"${CHECKSUM}\"|g" Package.swift
          echo "--- Package.swift (Syphon pin) ---"
          grep -nE "releases/download|checksum:" Package.swift

      - name: Open pull request
        if: steps.resolve.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/bump-syphon-${{ steps.resolve.outputs.tag }}
          base: main
          title: "chore: bump Syphon.xcframework pin to ${{ steps.resolve.outputs.tag }}"
          commit-message: "chore: bump Syphon.xcframework pin to ${{ steps.resolve.outputs.tag }}"
          body: |
            Automated by `syphon-bump.yml` to track metaphor release
            **${{ steps.resolve.outputs.tag }}** (see CONTRACT.md, L2a).

            - URL: `releases/download/${{ steps.resolve.outputs.tag }}/Syphon.xcframework.zip`
            - checksum (re-derived from the published asset): `${{ steps.resolve.outputs.checksum }}`

            Review and merge to consume the new Syphon build.
          delete-branch: true
