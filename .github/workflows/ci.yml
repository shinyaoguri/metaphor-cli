name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Check cross-repo contract
        run: ./scripts/check-contract.sh
      - name: Check wire-schema contract
        run: |
          pip3 install --quiet --break-system-packages check-jsonschema
          ./scripts/check-contract-schema.sh
      - name: Check CONTRACT.md identity across repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/check-contract-identity.sh
      - name: Check template freshness
        run: ./scripts/check-templates.sh
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
