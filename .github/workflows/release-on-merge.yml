name: Release on merge

# When a PR is merged to main, dispatch the existing Release workflow with an
# automatically determined bump. release.yml (build, version pin, tag, GitHub
# Release, Homebrew tap push) stays the single source of release logic — this
# workflow only decides *whether* and *how much* to bump.
#
# Bump resolution, in priority order:
#   1. `release:skip` label            -> never release
#   2. `release:major|minor|patch`     -> explicit override
#   3. Conventional Commits PR title   -> feat: minor / fix, perf: patch /
#      (= squash commit message)          anything else: no release
#
# `major` is never inferred automatically (a breaking `!` marker still maps to
# the type's normal bump) — going 1.0 or bumping major is always an explicit
# `release:major` label. Docs/chore/refactor merges ship with the next feat/fix
# release instead of cutting one of their own.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  actions: write   # dispatch release.yml via workflow_dispatch
  contents: read

jobs:
  dispatch-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Determine bump (label override, else Conventional Commits title)
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          BUMP=""
          if echo "$LABELS" | grep -q 'release:skip'; then
            echo "release:skip label present; not releasing."
          elif echo "$LABELS" | grep -q 'release:major'; then
            BUMP=major
          elif echo "$LABELS" | grep -q 'release:minor'; then
            BUMP=minor
          elif echo "$LABELS" | grep -q 'release:patch'; then
            BUMP=patch
          else
            # Squash-only repo: the PR title is the commit message on main.
            TYPE=$(printf '%s' "$TITLE" | sed -nE 's/^([a-z]+)(\([^)]*\))?!?:.*/\1/p')
            case "$TYPE" in
              feat)     BUMP=minor ;;
              fix|perf) BUMP=patch ;;
              *) echo "No release for type '${TYPE:-unparsable}' (title: $TITLE)." ;;
            esac
          fi
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Labels: [$LABELS] / Title: [$TITLE] -> bump: ${BUMP:-none}"

      - name: Dispatch Release workflow
        if: steps.bump.outputs.bump != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml \
            -R "${{ github.repository }}" \
            --ref main \
            -f bump="${{ steps.bump.outputs.bump }}"
          echo "Dispatched release.yml (bump=${{ steps.bump.outputs.bump }})."
